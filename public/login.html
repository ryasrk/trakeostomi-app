<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Sistem Laporan Trakeostomi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-wrapper">
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>

    <div class="login-card">
        <div class="login-header">
            <div class="login-icon-wrap">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2>Portal Admin</h2>
            <p>Masuk untuk mengelola laporan trakeostomi</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username admin" required autocomplete="username">
            </div>
            <div class="form-group login-password-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
                <button type="button" id="togglePassword" class="login-toggle-password" title="Tampilkan password">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn btn-primary login-submit-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Login Masuk
            </button>
        </form>
        <div class="login-back-wrapper">
            <a href="/index.html" class="login-back-link">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Form Laporan
            </a>
        </div>
        <div id="loginMessage" class="message hidden login-message"></div>
    </div>

    <div id="toast" class="message toast hidden" role="status" aria-live="polite"></div>

    <script src="ui.js" defer></script>
    <script src="login.js" defer></script>
</body>
</html>
